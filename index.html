<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siti per Local Business</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #faf8f5; color: #2d2d2d; padding: 60px 24px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 2rem; margin-bottom: 8px; }
  p { color: #6b6b6b; margin-bottom: 40px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card h2 { font-size: 1.3rem; margin-bottom: 4px; }
  .card a { color: #c9a84c; text-decoration: none; font-weight: 600; }
  .card a:hover { text-decoration: underline; }
  .badge { display: inline-block; background: #c9a84c; color: #1a1a2e; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <h1>🏪 Siti per Local Business</h1>
  <p>Demo di siti vetrina per piccole imprese italiane</p>
  <div class="card">
    <h2>💈 Barbiere da Marco</h2>
    <p style="margin: 4px 0 8px; color: #6b6b6b;">Napoli · Taglio uomo, barba, styling</p>
    <a href="barbiere-da-marco/">Visita il sito →</a>
  </div>
</div>
</body>
</html>
